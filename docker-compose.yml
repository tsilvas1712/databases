version: "3.7"

services:

    # db mysql
    mysql:
        container_name: dabase-mysql
        image: mysql:latest
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: 'root'
        volumes:
            - mysqlData:/var/lib/mysql
        ports:
            - "3306:3306"

    # db pgsql
    pgsql:
        container_name: dabase-pg
        image: postgres:16-alpine
        restart: always

        environment:
            POSTGRES_PASSWORD: 'postgres'
        volumes:
            - postgresData:/var/lib/postgresql/data
        ports:
            - "5432:5432"

    # db mongo
    mongo:
        container_name: database-mongo
        image: mongo:latest
        restart: always
        ports:
            - "27017:27017"
        volumes:
            - mongoData:/data/db

    # mailhog
    mailhog:
        container_name: mailhog
        image: mailhog/mailhog:latest
        ports:
            - "8025:8025"
            - "1025:1025"

    # redis
    redis:
        container_name: database-redis
        image: redis:latest
        restart: always
        ports:
            - "6379:6379"

    # rabbitmq
    rabbitmq:
        container_name: database-rabbitmq
        image: rabbitmq:3-management-alpine
        restart: always
        environment:
            RABBITMQ_DEFAULT_USER: rabbitmq
            RABBITMQ_DEFAULT_PASS: rabbitmq
        ports:
            - "5672:5672"   # AMQP
            - "15672:15672" # Management UI
        volumes:
            - rabbitmqData:/var/lib/rabbitmq

    # kafka (KRaft — sem Zookeeper)
    kafka:
        container_name: database-kafka
        image: apache/kafka:latest
        hostname: kafka
        restart: always
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
            KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:19092,EXTERNAL://:9094
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,EXTERNAL://localhost:9094
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_LOG_DIRS: /var/lib/kafka/data
        ports:
            - "9094:9094"
        volumes:
            - kafkaData:/var/lib/kafka/data

    # kafka ui
    kafka-ui:
        container_name: kafka-ui
        image: provectuslabs/kafka-ui:latest
        restart: always
        depends_on:
            - kafka
        ports:
            - "8090:8080"
        environment:
            KAFKA_CLUSTERS_0_NAME: local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092

volumes:
    postgresData:
    mysqlData:
    redisData:
    mongoData:
    rabbitmqData:
    kafkaData: